<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setlist</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#1a1a1a;color:#f0f0f0;min-height:100vh}
.app{max-width:600px;margin:0 auto;padding:1.5rem 1rem 3rem}
.header{margin-bottom:1.5rem;display:flex;align-items:center;gap:12px}
.logo{width:44px;height:44px;border-radius:10px;object-fit:cover}
.header h1{font-size:20px;font-weight:600}
.header p{font-size:13px;color:#aaa;margin-top:2px}
.tabs{display:flex;gap:6px;margin-bottom:1.25rem;background:#2a2a2a;border-radius:10px;padding:4px}
.tab{flex:1;padding:9px;border-radius:8px;border:none;background:transparent;font-size:14px;cursor:pointer;color:#888;font-weight:500}
.tab.active{background:#333;color:#fff}
.card{background:#242424;border:1px solid #333;border-radius:14px;padding:1.25rem;margin-bottom:1rem}
.lbl{font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem}
.ev-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem}
.ev-title{font-size:16px;font-weight:600}
.ev-date{font-size:12px;color:#aaa;margin-top:3px}
.badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}
.up{background:#0e2a47;color:#70b8f5}.past{background:#2a2a2a;color:#666}
.slist{display:flex;flex-direction:column;gap:8px}
.si{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;background:#2a2a2a;border:1px solid #333}
.snum{font-size:12px;color:#666;min-width:18px;font-weight:600}
.sinfo{flex:1;min-width:0}
.sname{font-size:14px;font-weight:500}
.slink{font-size:12px;color:#4d9de0;text-decoration:none;margin-top:2px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{text-align:center;padding:1.5rem;color:#666;font-size:14px}
.pin-wrap{text-align:center;padding:2rem 0}
.pin-wrap h2{font-size:17px;font-weight:600;margin-bottom:6px}
.pin-wrap .sub{font-size:14px;color:#aaa;margin-bottom:1.5rem}
.pin-row{display:flex;gap:8px;justify-content:center}
.pin-row input{width:120px;text-align:center;letter-spacing:.3em;font-size:18px;padding:10px;border:1.5px solid #444;border-radius:10px;background:#2a2a2a;color:#fff;outline:none;font-family:inherit}
.pin-err{font-size:12px;color:#e07070;margin-top:10px;display:none}
.btn{padding:9px 18px;border-radius:9px;border:1px solid #444;background:transparent;font-size:14px;cursor:pointer;color:#fff;font-weight:500;font-family:inherit}
.btn:hover{background:#333}
.btn-p{background:#5b4fcf;color:#fff;border:none;width:100%;padding:11px;font-size:15px;border-radius:10px;margin-top:8px;cursor:pointer;font-weight:500;font-family:inherit;display:block}
.btn-p:hover{background:#4a3fbf}
.btn-r{padding:5px 10px;font-size:12px;color:#e07070;border:none;background:transparent;border-radius:6px;cursor:pointer;font-family:inherit}
.btn-danger{background:#3a1010;color:#e07070;border:1px solid #5a2020;width:100%;padding:11px;font-size:14px;border-radius:10px;margin-top:4px;cursor:pointer;font-family:inherit}
.btn-danger:hover{background:#4a1515}
.fg{margin-bottom:1rem}
.fg label{font-size:13px;color:#aaa;display:block;margin-bottom:6px;font-weight:500}
.fg input{width:100%;padding:10px 12px;border:1px solid #444;border-radius:9px;background:#2a2a2a;color:#fff;font-size:14px;outline:none;font-family:inherit}
.fg input:focus{border-color:#5b4fcf}
.divider{border:none;border-top:1px solid #333;margin:1.25rem 0}
.ei{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:10px;border:1px solid #333;cursor:pointer;margin-bottom:6px;background:#2a2a2a}
.ei.sel{border-color:#5b4fcf;background:#1e1a40}
.ei.sel .ei-n{color:#9b8ef5}
.ei-n{font-size:14px;font-weight:500}
.ei-d{font-size:12px;color:#aaa;margin-top:2px}
.out-btn{background:none;border:none;color:#666;font-size:13px;cursor:pointer;margin-top:1.5rem;padding:0;font-family:inherit;display:block}
.leader-nav{display:flex;gap:8px;margin-bottom:1rem}
.lnav{flex:1;padding:8px;border-radius:8px;border:1px solid #444;background:transparent;font-size:13px;cursor:pointer;color:#888;font-weight:500;font-family:inherit}
.lnav.active{background:#2a2a2a;color:#fff;border-color:#555}
.pin-status{display:inline-block;background:#1a3a1a;color:#5fd68a;font-size:12px;padding:3px 10px;border-radius:20px;margin-bottom:1rem}
.fetching{font-size:12px;color:#9b8ef5;margin-top:4px;display:none}
.fetching.on{display:block}
.fetch-ok{font-size:12px;color:#5fd68a;margin-top:4px;display:none}
.fetch-ok.on{display:block}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;color:#fff;border:1px solid #444;padding:10px 24px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.on{opacity:1}
.nev{text-align:center;padding:3rem 1rem;color:#666}
.yt-thumb{width:48px;height:36px;border-radius:6px;object-fit:cover;flex-shrink:0}
</style>
</head>

      <div style="font-size:36px;margin-bottom:1rem">&#128274;</div>

        <input type="password" id="pi" placeholder="..." maxlength="6"/>

    </div>

      <div class="leader-nav">

        <button class="lnav" id="ln1" onclick="lTab(1)">&#9881; Configuracoes</button>
      </div>
      <div id="lp0">
        <div class="card">
          <p class="lbl">Eventos cadastrados</p>
          <div id="el"></div>
          <div class="divider"></div>
          <p class="lbl">Novo evento</p>
          <div class="fg"><label>Nome</label><input type="text" id="en" placeholder="Ex: Culto domingo"/></div>
          <div class="fg"><label>Data</label><input type="date" id="ed"/></div>
          <button class="btn-p" onclick="criarEvento()">+ Criar evento</button>
        </div>
        <div id="sm" style="display:none">
          <div class="card">
            <p class="lbl" id="smt">Musicas</p>
            <div id="sl" class="slist"></div>
            <div class="divider"></div>
            <div class="fg">
              <label>Link do YouTube</label>
              <input type="text" id="ml" placeholder="Cole o link do YouTube aqui..." oninput="onLinkInput()"/>
              <p class="fetching" id="fetching">Buscando titulo...</p>
              <p class="fetch-ok" id="fetch-ok">&#10003; Titulo encontrado!</p>
            </div>

              <label>Nome da musica</label>
              <input type="text" id="mn" placeholder="Preenchido automaticamente ou digite"/>
            </div>

          <div class="fg"><label>Confirmar novo PIN</label><input type="password" id="cnp" placeholder="Repetir novo PIN" maxlength="6"/></div>

<div class="toast" id="tk"></div>
<script>
var KEY="sl10";
var cfg={pin:"1234"};
var evs=[];
var sid=null;
var fetchTimer=null;

function load(){
  try{
    var r=localStorage.getItem(KEY);
    if(r){var d=JSON.parse(r);evs=d.evs||[];cfg=d.cfg||{pin:"1234"};}
  }catch(e){evs=[];cfg={pin:"1234"};}
}

function save(){
  try{localStorage.setItem(KEY,JSON.stringify({evs:evs,cfg:cfg}));}
  catch(e){}
}

function toast(m){
  var t=document.getElementById("tk");
  t.textContent=m;t.className="toast on";
  setTimeout(function(){t.className="toast";},2500);
}

function fmt(d){
  if(!d)return"";
  var p=d.split("-");
  var ms=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
  return parseInt(p[2])+" de "+ms[parseInt(p[1])-1]+" de "+p[0];
}

function fut(d){
  var h=new Date();h.setHours(0,0,0,0);
  return new Date(d+"T12:00:00")>=h;
}

function esc(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function getYtId(url){
  var m=url.match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([A-Za-z0-9_-]{11})/);
  return m?m[1]:null;
}

function onLinkInput(){
  var url=document.getElementById("ml").value.trim();
  var fe=document.getElementById("fetching");
  var fo=document.getElementById("fetch-ok");
  fe.className="fetching";fo.className="fetch-ok";
  if(fetchTimer)clearTimeout(fetchTimer);
  var id=getYtId(url);
  if(!id)return;
  fe.className="fetching on";
  fetchTimer=setTimeout(function(){fetchYtTitle(id);},600);
}

function fetchYtTitle(id){
  var fe=document.getElementById("fetching");
  var fo=document.getElementById("fetch-ok");
  var mn=document.getElementById("mn");
  var url="https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v="+id+"&format=json";
  fetch(url)
    .then(function(r){return r.json();})
    .then(function(d){
      if(d&&d.title){
        mn.value=d.title;
        fe.className="fetching";
        fo.className="fetch-ok on";
      }else{
        fe.className="fetching";
      }
    })
    .catch(function(){
      fe.className="fetching";
    });
}

function goTab(n){
  document.getElementById("t0").className="tab"+(n===0?" active":"");
  document.getElementById("t1").className="tab"+(n===1?" active":"");
  document.getElementById("pv").style.display=n===0?"block":"none";
  document.getElementById("pl").style.display=n===1?"block":"none";
  if(n===0)rv();
}

function lTab(n){
  document.getElementById("ln0").className="lnav"+(n===0?" active":"");
  document.getElementById("ln1").className="lnav"+(n===1?" active":"");
  document.getElementById("lp0").style.display=n===0?"block":"none";
  document.getElementById("lp1").style.display=n===1?"block":"none";
}

function rv(){
  var c=document.getElementById("pv");
  if(!evs.length){
    c.innerHTML="<div class=\"nev\"><div style=\"font-size:40px;margin-bottom:1rem\">&#127926;</div><p>Nenhum evento ainda.</p></div>";
    return;
  }
  var sorted=evs.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});
  var h="";
  for(var i=0;i<sorted.length;i++){
    var e=sorted[i],ss=e.songs||[],u=fut(e.date);
    h+="<div class=\"card\"><div class=\"ev-hdr\">";
    h+="<div><div class=\"ev-title\">"+esc(e.name)+"</div><div class=\"ev-date\">"+fmt(e.date)+"</div></div>";
    h+="<span class=\"badge "+(u?"up":"past")+"\">"+( u?"Proximo":"Realizado")+"</span></div>";
    if(ss.length){
      h+="<p class=\"lbl\">"+ss.length+" musica"+(ss.length!==1?"s":"")+"</p><div class=\"slist\">";
      for(var j=0;j<ss.length;j++){
        var m=ss[j];
        var thumb=m.ytid?"<img class=\"yt-thumb\" src=\"https://img.youtube.com/vi/"+m.ytid+"/default.jpg\" alt=\"\"/>":"";
        h+="<div class=\"si\">"+thumb+"<span class=\"snum\">"+(j+1)+"</span><div class=\"sinfo\">";
        h+="<div class=\"sname\">"+esc(m.name)+"</div>";
        if(m.link)h+="<a class=\"slink\" href=\""+esc(m.link)+"\" target=\"_blank\">Abrir no YouTube</a>";
        h+="</div></div>";
      }
      h+="</div>";
    }else{
      h+="<div class=\"empty\">Nenhuma musica adicionada ainda.</div>";
    }
    h+="</div>";
  }
  c.innerHTML=h;
}

function checkPin(){
  var v=document.getElementById("pi").value;
  if(v===cfg.pin){
    document.getElementById("pp").style.display="none";
    document.getElementById("lp").style.display="block";
    lTab(0);rl();
  }else{
    document.getElementById("pe").style.display="block";
    document.getElementById("pi").value="";
  }
}

document.getElementById("pi").onkeydown=function(e){if(e.key==="Enter")checkPin();};

function sair(){
  sid=null;
  document.getElementById("pp").style.display="block";
  document.getElementById("lp").style.display="none";
  document.getElementById("pi").value="";
  document.getElementById("pe").style.display="none";
  document.getElementById("sm").style.display="none";
  document.getElementById("cp").value="";
  document.getElementById("np").value="";
  document.getElementById("cnp").value="";
  goTab(0);
}

function rl(){
  var sorted=evs.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});
  var h="";
  if(!sorted.length){
    h="<div class=\"empty\" style=\"padding:.5rem 0\">Nenhum evento ainda</div>";
  }else{
    for(var i=0;i<sorted.length;i++){
      var e=sorted[i],c=sid===e.id?" sel":"";
      h+="<div class=\"ei"+c+"\" onclick=\"selEv('"+e.id+"')\">";
      h+="<div><div class=\"ei-n\">"+esc(e.name)+"</div><div class=\"ei-d\">"+fmt(e.date)+"</div></div>";
      h+="<button class=\"btn-r\" onclick=\"event.stopPropagation();delEv('"+e.id+"')\">remover</button>";
      h+="</div>";
    }
  }
  document.getElementById("el").innerHTML=h;
  if(sid)rsm();
}

function selEv(id){
  sid=id;rl();
  document.getElementById("sm").style.display="block";
  rsm();
}

function rsm(){
  var e=null;
  for(var i=0;i<evs.length;i++){if(evs[i].id===sid){e=evs[i];break;}}
  if(!e)return;
  document.getElementById("smt").textContent="Musicas: "+e.name;
  var ss=e.songs||[],h="";
  if(ss.length){
    for(var j=0;j<ss.length;j++){
      var m=ss[j];
      var thumb=m.ytid?"<img class=\"yt-thumb\" src=\"https://img.youtube.com/vi/"+m.ytid+"/default.jpg\" alt=\"\"/>":"";
      h+="<div class=\"si\">"+thumb+"<span class=\"snum\">"+(j+1)+"</span><div class=\"sinfo\">";
      h+="<div class=\"sname\">"+esc(m.name)+"</div>";
      if(m.link)h+="<a class=\"slink\" href=\""+esc(m.link)+"\" target=\"_blank\">Abrir no YouTube</a>";
      h+="</div><button class=\"btn-r\" onclick=\"delM('"+m.id+"')\">remover</button></div>";
    }
  }else{
    h="<div class=\"empty\" style=\"padding:.5rem 0\">Nenhuma musica ainda</div>";
  }
  document.getElementById("sl").innerHTML=h;
}

function criarEvento(){
  var ne=document.getElementById("en"),de=document.getElementById("ed");
  var n=ne.value.trim(),d=de.value;
  if(!n){toast("Digite o nome!");ne.focus();return;}
  if(!d){toast("Selecione a data!");de.focus();return;}
  evs.push({id:"e"+Date.now(),name:n,date:d,songs:[]});
  save();ne.value="";de.value="";rl();toast("Evento criado!");
}

function delEv(id){
  if(!confirm("Remover este evento?"))return;
  var tmp=[];
  for(var i=0;i<evs.length;i++){if(evs[i].id!==id)tmp.push(evs[i]);}
  evs=tmp;
  if(sid===id){sid=null;document.getElementById("sm").style.display="none";}
  save();rl();toast("Removido.");
}

function adicionarMusica(){
  var ne=document.getElementById("mn"),le=document.getElementById("ml");
  var n=ne.value.trim(),l=le.value.trim();
  if(!l){toast("Cole o link do YouTube!");le.focus();return;}
  if(!n){toast("Digite o nome da musica!");ne.focus();return;}
  if(!sid){toast("Selecione um evento!");return;}
  var e=null;
  for(var i=0;i<evs.length;i++){if(evs[i].id===sid){e=evs[i];break;}}
  if(!e)return;
  if(!e.songs)e.songs=[];
  var ytid=getYtId(l);
  e.songs.push({id:"s"+Date.now(),name:n,link:l,ytid:ytid||""});
  save();
  ne.value="";le.value="";
  document.getElementById("fetching").className="fetching";
  document.getElementById("fetch-ok").className="fetch-ok";
  rsm();toast("Musica adicionada!");
}

function delM(id){
  var e=null;
  for(var i=0;i<evs.length;i++){if(evs[i].id===sid){e=evs[i];break;}}
  if(!e)return;
  var tmp=[];
  for(var j=0;j<e.songs.length;j++){if(e.songs[j].id!==id)tmp.push(e.songs[j]);}
  e.songs=tmp;
  save();rsm();toast("Removida.");
}

function alterarPin(){
  var cp=document.getElementById("cp").value;
  var np=document.getElementById("np").value;
  var cnp=document.getElementById("cnp").value;
  if(cp!==cfg.pin){toast("PIN atual incorreto!");document.getElementById("cp").value="";return;}
  if(np.length<4){toast("Novo PIN deve ter ao menos 4 digitos!");return;}
  if(np!==cnp){toast("Os PINs nao coincidem!");document.getElementById("cnp").value="";return;}
  cfg.pin=np;save();
  document.getElementById("cp").value="";
  document.getElementById("np").value="";
  document.getElementById("cnp").value="";
  toast("PIN alterado!");
}

function limparDados(){
  if(!confirm("Apagar TODOS os eventos e musicas?"))return;
  evs=[];sid=null;
  document.getElementById("sm").style.display="none";
  save();rl();toast("Dados apagados.");
}

load();rv();
</script>
</body>
</html>
